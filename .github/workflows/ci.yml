name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
    - name: Run tests
      run: cargo test --verbose
    - name: Run doc-tests
      run: cargo test --doc --verbose
    - name: Run DIAGNOSTICS II V1.2
      run: cargo test --release --test cputest -- --ignored --nocapture
    - name: Run z80type
      run: cargo test --release --test z80type -- --ignored --nocapture
    - name: Run z80test (z80full)
      run: cargo test --release --test z80test -- --ignored --nocapture
    - name: Run ZEXALL (test_zexdoc)
      run: cargo test --release --test zexall test_zexdoc -- --ignored --nocapture
    - name: Run ZEXALL (test_zexall)
      run: cargo test --release --test zexall test_zexall -- --ignored --nocapture

  clippy:
    name: Clippy
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Run clippy
      run: cargo clippy -- -D warnings

  fmt:
    name: Format
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  docs:
    name: Docs
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
    - name: Check docs
      run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  coverage:
    name: Coverage
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - uses: dtolnay/rust-toolchain@stable
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Generate coverage
      run: cargo llvm-cov --release --all-features --workspace --codecov --output-path codecov.json -- --include-ignored
    - name: Upload to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: codecov.json
        fail_ci_if_error: true
